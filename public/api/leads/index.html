<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Leads · Min Egenkontroll</title>
  <link rel="stylesheet" href="/api/leads/styles.css">
</head>
<body>
  <main class="page-shell">
    <header class="page-header">
      <div>
        <p class="eyebrow">Privat admin</p>
        <h1>Leads</h1>
        <p class="muted">Aktuell och automatiskt uppdaterad lista över relevanta verksamheter.</p>
      </div>
      <a class="back-link" href="/">Till appen</a>
    </header>

    <section id="auth-state" hidden></section>

    <div id="dashboard" hidden>
      <section id="sync-summary" class="sync-card"></section>

      <nav class="filter-bar" aria-label="Filtrera leads">
        <button type="button" data-filter="all">Alla</button>
        <button type="button" data-filter="new">Nya</button>
        <button type="button" data-filter="uncontacted" class="active">Ej kontaktade</button>
        <button type="button" data-filter="contacted">Mailade</button>
        <button type="button" data-filter="email">Har e-post</button>
      </nav>

      <nav class="filter-bar city-filter-bar" aria-label="Filtrera på ort">
        <button type="button" data-city="all" class="active">Alla orter</button>
        <button type="button" data-city="göteborg">Göteborg</button>
        <button type="button" data-city="stockholm">Stockholm</button>
      </nav>

      <div class="lead-tools">
        <form id="search-form" class="search-form">
          <input id="search-input" type="search" placeholder="Sök företag, typ, adress, ort eller e-post" autocomplete="off">
          <button type="submit">Sök</button>
        </form>

        <label class="sort-control">
          <span>Sortera</span>
          <select id="sort-select">
            <option value="newest">Nya först</option>
            <option value="email">E-post först</option>
            <option value="name">Namn A–Ö</option>
            <option value="type">Verksamhetstyp</option>
            <option value="city">Ort</option>
          </select>
        </label>
      </div>

      <div class="result-row">
        <strong id="result-count">0 träffar</strong>
        <span id="result-range"></span>
      </div>

      <p id="message" class="message" role="status" hidden></p>
      <section id="business-list" class="business-list" aria-live="polite"></section>

      <nav id="pagination" class="pagination" aria-label="Sidnavigering" hidden>
        <button id="previous-page" type="button">Föregående</button>
        <span id="page-label">Sida 1</span>
        <button id="next-page" type="button">Nästa</button>
      </nav>
    </div>

    <footer class="data-attribution">
      Grundregister: Göteborgs Stad samt Stockholms stad, miljöförvaltningen. Vissa kontaktuppgifter matchas automatiskt mot
      <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noreferrer">OpenStreetMap</a>
      och
      <a href="https://overturemaps.org/" target="_blank" rel="noreferrer">Overture Maps</a>.
    </footer>
  </main>

  <script type="module" src="/api/leads/app.js"></script>
</body>
</html>
