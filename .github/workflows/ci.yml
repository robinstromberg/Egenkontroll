name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Public platform contracts
        run: npm run contracts

      - name: App workspace typecheck
        run: npm run typecheck --workspace @min-egenkontroll/app

      - name: Lint
        run: npm run lint

      - name: App workspace build
        run: npm run build --workspace @min-egenkontroll/app
